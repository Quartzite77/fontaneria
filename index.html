<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Tarjetas Interactivas – Herramientas</title>
  <style>
    :root{
      --bg1:#0b1020;
      --bg2:#0f766e;

      --border: rgba(255,255,255,.16);
      --text:#eaf0ff;
      --muted:#b9c3da;
      --shadow: 0 18px 45px rgba(0,0,0,.35);
      --radius: 18px;

      --ok:#22c55e;
      --warn:#f97316;
      --info:#38bdf8;
      --pink:#fb7185;
      --yellow:#fbbf24;
      --violet:#a78bfa;
    }

    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      color:var(--text);
      min-height:100vh;
      background:
        radial-gradient(1200px 700px at 15% 10%, rgba(56,189,248,.16), transparent 60%),
        radial-gradient(900px 600px at 85% 20%, rgba(34,197,94,.16), transparent 55%),
        radial-gradient(900px 700px at 50% 90%, rgba(249,115,22,.12), transparent 55%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    header{
      padding: 26px 18px 10px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .top{
      display:flex;
      justify-content:space-between;
      gap:14px;
      flex-wrap:wrap;
      align-items:flex-end;
    }

    h1{
      margin:0;
      font-size: clamp(20px, 3.0vw, 34px);
      line-height:1.15;
    }

    .subtitle{
      margin:10px 0 0;
      color:var(--muted);
      max-width: 80ch;
      line-height:1.45;
      font-size: 14px;
    }

    .chiprow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      margin-top:14px;
    }

    .chip{
      background: rgba(255,255,255,.08);
      border:1px solid var(--border);
      padding:8px 12px;
      border-radius:999px;
      font-size:13px;
      color:var(--text);
      cursor:pointer;
      transition: transform .08s ease, background .15s ease, border-color .15s ease;
      user-select:none;
    }
    .chip:hover{ transform: translateY(-1px); }
    .chip.active{
      background: rgba(34,197,94,.18);
      border-color: rgba(34,197,94,.45);
    }

    main{
      max-width: 1200px;
      margin: 0 auto;
      padding: 10px 18px 40px;
    }

    section{
      margin-top: 18px;
      padding: 16px;
      border-radius: 22px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
      box-shadow: 0 10px 25px rgba(0,0,0,.16);
      backdrop-filter: blur(8px);
    }

    .sectionHead{
      display:flex;
      flex-wrap:wrap;
      align-items:baseline;
      gap:10px;
      justify-content:space-between;
      margin-bottom: 10px;
    }
    .sectionTitle{
      margin:0;
      font-size: 18px;
      letter-spacing:.2px;
    }
    .sectionNote{
      margin:0;
      color:var(--muted);
      font-size: 13px;
    }

    .controls{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      align-items:center;
      margin-top: 10px;
      margin-bottom: 8px;
    }

    .search{
      flex: 1 1 260px;
      display:flex;
      gap:10px;
      align-items:center;
      padding: 10px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      border:1px solid var(--border);
      box-shadow: 0 10px 22px rgba(0,0,0,.15);
    }
    .search svg{ opacity:.9 }
    .search input{
      width:100%;
      border:none;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size: 14px;
    }

    .btn{
      border:none;
      cursor:pointer;
      padding:10px 12px;
      border-radius: 999px;
      color:var(--text);
      background: rgba(255,255,255,.08);
      border:1px solid var(--border);
      transition: transform .08s ease, background .15s ease;
      font-size: 13px;
      user-select:none;
    }
    .btn:hover{ transform: translateY(-1px); }
    .btn.primary{
      background: rgba(56,189,248,.18);
      border-color: rgba(56,189,248,.40);
    }

    .grid{
      display:grid;
      grid-template-columns: repeat( auto-fit, minmax(220px, 1fr) );
      gap: 16px;
      margin-top: 12px;
    }

    .cardWrap{ perspective: 1100px; }

    .card{
      position:relative;
      width:100%;
      min-height: 350px;
      border-radius: var(--radius);
      transform-style: preserve-3d;
      transition: transform .65s cubic-bezier(.2,.8,.2,1);
      box-shadow: var(--shadow);
      outline: 1px solid rgba(255,255,255,.10);
      background: rgba(255,255,255,.06);
      cursor:pointer;
      user-select:none;
    }
    .card.is-flipped{ transform: rotateY(180deg); }

    .side{
      position:absolute;
      inset:0;
      backface-visibility:hidden;
      border-radius: var(--radius);
      overflow:hidden;
      display:flex;
      flex-direction:column;
    }

    .front{
      background:
        radial-gradient(600px 350px at 10% 20%, rgba(251,191,36,.18), transparent 55%),
        radial-gradient(620px 420px at 90% 10%, rgba(167,139,250,.18), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding: 10px 12px;
      margin: 14px 14px 8px;
      border-radius:999px;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.16);
      width: fit-content;
      font-size: 12px;
      color: var(--text);
      letter-spacing:.2px;
    }
    .dot{
      width:10px; height:10px; border-radius: 50%;
      background: var(--info);
      box-shadow: 0 0 0 3px rgba(56,189,248,.18);
      flex: 0 0 auto;
    }

    .frontBody{
      padding: 6px 16px 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
      min-height: 0;
    }

    .cardTitle{
      margin:0;
      font-size: 20px;
      line-height:1.15;
    }
    .cardMeta{
      margin:0;
      color: var(--muted);
      font-size: 13px;
      line-height:1.35;
    }

    .imageBox{
      margin-top:auto;
      border-radius: 16px;
      overflow:hidden;
      background: rgba(0,0,0,.25);
      border: 1px solid rgba(255,255,255,.12);
      min-height: 150px;
      display:flex;
      align-items:center;
      justify-content:center;
      position: relative;
    }
    .imageBox img{
      width:100%;
      height: 260px;
      object-fit: cover;
      display:block;
    }

    .fileLabel{
      position:absolute;
      top: 12px;
      left: 12px;
      padding: 7px 10px;
      border-radius: 999px;
      background: rgba(0,0,0,.35);
      border: 1px solid rgba(255,255,255,.18);
      color: rgba(255,255,255,.92);
      font-size: 12px;
      backdrop-filter: blur(6px);
      max-width: calc(100% - 24px);
      overflow:hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      pointer-events:none;
    }

    .imageFallback{
      padding: 18px;
      text-align:center;
      color: rgba(255,255,255,.85);
      font-size: 13px;
      line-height: 1.4;
    }

    .hint{
      position:absolute;
      bottom: 12px;
      right: 12px;
      background: rgba(34,197,94,.18);
      border: 1px solid rgba(34,197,94,.42);
      padding: 8px 10px;
      border-radius: 999px;
      font-size: 12px;
      display:flex;
      gap:8px;
      align-items:center;
      box-shadow: 0 10px 22px rgba(0,0,0,.14);
      pointer-events:none;
      color: #0b1020;
    }

    .back{
      transform: rotateY(180deg);
      background:
        radial-gradient(700px 400px at 15% 20%, rgba(34,197,94,.18), transparent 55%),
        radial-gradient(700px 400px at 85% 10%, rgba(251,113,133,.14), transparent 55%),
        linear-gradient(180deg, rgba(15,23,42,.9), rgba(2,6,23,.92));
    }

    .backBody{
      padding: 16px;
      display:flex;
      flex-direction:column;
      gap:10px;
      height:100%;
      min-height: 0;
    }

    .backTitle{
      margin: 0;
      font-size: 18px;
      line-height:1.2;
      flex: 0 0 auto;
    }

    .pillInfo{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top: 2px;
      flex: 0 0 auto;
    }

    .pill{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:8px 10px;
      border-radius: 999px;
      font-size: 12px;
      border: 1px solid rgba(255,255,255,.14);
      background: rgba(255,255,255,.07);
      color: var(--text);
    }

    .scrollArea{
      flex: 1 1 auto;
      min-height: 0;
      overflow: auto;
      padding-right: 4px;
      margin-top: 6px;
    }
    .scrollArea::-webkit-scrollbar{ width: 10px; }
    .scrollArea::-webkit-scrollbar-thumb{
      background: rgba(255,255,255,.18);
      border: 2px solid rgba(0,0,0,0);
      background-clip: padding-box;
      border-radius: 999px;
    }
    .scrollArea::-webkit-scrollbar-track{ background: rgba(255,255,255,.06); border-radius: 999px; }

    .list{
      margin: 0;
      padding: 0;
      list-style: none;
      display:flex;
      flex-direction:column;
      gap:10px;
    }

    .item{
      display:flex;
      gap:10px;
      align-items:flex-start;
      padding: 10px 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.06);
      border: 1px solid rgba(255,255,255,.10);
    }
    .badge{
      flex: 0 0 auto;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      margin-top: 6px;
      background: var(--warn);
      box-shadow: 0 0 0 3px rgba(249,115,22,.16);
    }

    .itemText{
      margin: 0;
      color: rgba(235,244,255,.92);
      font-size: 13px;
      line-height: 1.35;
    }
    .itemText strong{ color: #fff; }

    .toolFrontOnlyImage .imageBox{
      margin-top: 10px;
      min-height: 260px;
    }

    .hidden{ display:none !important; }
  </style>
</head>

<body>
  <header>
    <div class="top">
      <div>
        <h1>Tarjetas Interactivas: Herramientas</h1>
        <p class="subtitle">Sección 1: tipos. Sección 2: adiviná por la imagen; al voltear sale la respuesta.</p>
      </div>
      <div class="chiprow" id="modeChips">
        <div class="chip active" data-target="sec1">Ver Sección 1</div>
        <div class="chip" data-target="sec2">Ver Sección 2</div>
      </div>
    </div>
  </header>

  <main>
    <section id="sec1">
      <div class="sectionHead">
        <h2 class="sectionTitle">Sección 1: Tipos de herramientas</h2>
        <p class="sectionNote">Clic para voltear.</p>
      </div>

      <div class="controls">
        <div class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.5 19a8.5 8.5 0 1 1 0-17 8.5 8.5 0 0 1 0 17Z" stroke="currentColor" stroke-width="2"/>
            <path d="M16.5 16.5 22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="searchCats" type="search" placeholder="Buscar tipo (ej: Corte, Desbaste, Desarme, Sonda)..." />
        </div>
        <button class="btn primary" id="resetCats">Restablecer</button>
      </div>

      <div class="grid" id="gridCats"></div>
    </section>

    <section id="sec2" class="hidden">
      <div class="sectionHead">
        <h2 class="sectionTitle">Sección 2: Adiviná la herramienta</h2>
        <p class="sectionNote">Frente: solo imagen. Reverso: nombre, grupo y uso.</p>
      </div>

      <div class="controls">
        <div class="search">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
            <path d="M10.5 19a8.5 8.5 0 1 1 0-17 8.5 8.5 0 0 1 0 17Z" stroke="currentColor" stroke-width="2"/>
            <path d="M16.5 16.5 22 22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
          <input id="searchTools" type="search" placeholder="Buscar (si querés) por nombre, grupo o uso..." />
        </div>
        <button class="btn" id="filterAll">Todas</button>
        <button class="btn" id="filterGroup">Filtrar por grupo</button>
        <button class="btn primary" id="resetTools">Restablecer</button>
      </div>

      <div class="grid" id="gridTools"></div>
    </section>
  </main>

  <script>
    const categories = [
      { type: "Corte", tools: ["cortadora de PVC","arco para segueta"], color: "var(--yellow)" },
      { type: "Desbaste", tools: ["lima plana","lima redonda"], color: "var(--ok)" },
      { type: "Desarme", tools: ["llave francesa","llave inglesa","llave de lavabo","llave recta","desarmador plano","desarmador de cruz","extractor de asientos","alicate de presión","alicates"], color: "var(--pink)" },
      { type: "Sonda", tools: ["sonda"], color: "var(--info)" }
    ];

    const tools = [
      { name:"Cortadora de PVC", group:"Corte", use:"Se utiliza para cortar tubos de PVC de forma recta y precisa.", file:"cortadora_pvc.jpg", img:"imagenes/cortadora_pvc.jpg" },
      { name:"Arco para segueta", group:"Corte", use:"Se usa para cortar tuberías y piezas plásticas o metálicas en trabajos de fontanería.", file:"arco_segueta.jpg", img:"imagenes/arco_segueta.jpg" },

      { name:"Lima plana", group:"Desbaste", use:"Sirve para desbastar, alisar y corregir bordes rectos después del corte de una pieza o tubería.", file:"lima_plana.jpg", img:"imagenes/lima_plana.jpg" },
      { name:"Lima redonda", group:"Desbaste", use:"Se utiliza para desbastar bordes curvos, ampliar orificios y corregir superficies circulares.", file:"lima_redonda.jpg", img:"imagenes/lima_redonda.jpg" },

      { name:"Llave francesa", group:"Desarme", use:"Se emplea para aflojar o ajustar tuercas y conexiones de diferentes medidas.", file:"llave_francesa.jpg", img:"imagenes/llave_francesa.jpg" },
      { name:"Llave inglesa", group:"Desarme", use:"Se usa para apretar o aflojar piezas metálicas y uniones roscadas en instalaciones de fontanería.", file:"llave_inglesa.jpg", img:"imagenes/llave_inglesa.jpg" },
      { name:"Llave de lavabo", group:"Desarme", use:"Sirve para trabajar y aflojar tuercas en espacios reducidos debajo de lavamanos o fregaderos.", file:"llave_lavabo.jpg", img:"imagenes/llave_lavabo.jpg" },
      { name:"Llave recta", group:"Desarme", use:"Se utiliza para aflojar o ajustar tuercas y pernos. Tiene un extremo abierto y otro cerrado tipo estrella para aplicar mayor torque.", file:"llave_recta.jpg", img:"imagenes/llave_recta.jpg" },
      { name:"Desarmador plano", group:"Desarme", use:"Se emplea para aflojar o ajustar tornillos de cabeza recta.", file:"desarmador_plano.jpg", img:"imagenes/desarmador_plano.jpg" },
      { name:"Desarmador de cruz", group:"Desarme", use:"Se utiliza para aflojar o ajustar tornillos de cabeza en cruz o estrella.", file:"desarmador_cruz.jpg", img:"imagenes/desarmador_cruz.jpg" },
      { name:"Extractor de asientos", group:"Desarme", use:"Sirve para retirar piezas internas de llaves o grifos durante reparaciones.", file:"extractor_asientos.jpg", img:"imagenes/extractor_asientos.jpg" },
      { name:"Alicate de presión", group:"Desarme", use:"Se usa para sujetar piezas con firmeza mientras se aflojan, ajustan o desmontan conexiones.", file:"alicate_presion.jpg", img:"imagenes/alicate_presion.jpg" },
      { name:"Alicates", group:"Desarme", use:"Se utilizan para sujetar, doblar o manipular piezas pequeñas y accesorios de fontanería.", file:"alicates.jpg", img:"imagenes/alicates.jpg" },

      { name:"Sonda", group:"Sonda", use:"Se utiliza para destapar tuberías y desagües obstruidos.", file:"sonda.jpg", img:"imagenes/sonda.jpg" }
    ];

    const el = (sel) => document.querySelector(sel);
    const make = (tag, cls) => { const n = document.createElement(tag); if (cls) n.className = cls; return n; };
    const normalize = (s) => (s||"").toLowerCase().normalize("NFD").replace(/\p{Diacritic}/gu,"");

    function flipOnClick(cardEl){
      cardEl.addEventListener("click", () => cardEl.classList.toggle("is-flipped"));
      cardEl.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") { e.preventDefault(); cardEl.classList.toggle("is-flipped"); }
      });
    }

    function cardShell(dotColor){
      const wrap = make("div","cardWrap");
      const card = make("div","card");
      card.tabIndex = 0;
      card.setAttribute("role","button");
      card.setAttribute("aria-label","Voltear tarjeta");
      wrap.appendChild(card);

      const front = make("div","side front");
      const back = make("div","side back");

      const tag = make("div","tag");
      const dot = make("div","dot");
      dot.style.background = dotColor || "var(--info)";
      tag.appendChild(dot);
      const tagText = make("span");
      tagText.textContent = "Clic para voltear";
      tag.appendChild(tagText);
      front.appendChild(tag);

      const frontBody = make("div","frontBody");
      const backBody = make("div","backBody");

      front.appendChild(frontBody);
      back.appendChild(backBody);

      card.appendChild(front);
      card.appendChild(back);

      flipOnClick(card);
      return { wrap, frontBody, backBody, front };
    }

    // Sección 1
    const gridCats = el("#gridCats");
    const searchCats = el("#searchCats");

    function renderCategories(filter=""){
      gridCats.innerHTML = "";
      const q = normalize(filter);

      const list = categories.filter(c =>
        normalize(c.type).includes(q) || c.tools.some(t => normalize(t).includes(q))
      );

      list.forEach(c => {
        const { wrap, frontBody, backBody } = cardShell(c.color);

        const title = make("h3","cardTitle");
        title.textContent = c.type;
        frontBody.appendChild(title);

        const meta = make("p","cardMeta");
        meta.textContent = "Volteá para ver las herramientas de este grupo.";
        frontBody.appendChild(meta);

        const imgBox = make("div","imageBox");
        imgBox.innerHTML = `<div class="imageFallback">Grupo<br><strong>${c.type}</strong></div><div class="hint">↩︎ Voltear</div>`;
        frontBody.appendChild(imgBox);

        const backTitle = make("h3","backTitle");
        backTitle.textContent = `Incluye: ${c.type}`;
        backBody.appendChild(backTitle);

        const pills = make("div","pillInfo");
        const p1 = make("div","pill"); p1.textContent = `Total: ${c.tools.length}`;
        pills.appendChild(p1);
        backBody.appendChild(pills);

        const scroll = make("div","scrollArea");
        const ul = make("ul","list");
        c.tools.forEach(t => {
          const li = make("li","item");
          const b = make("div","badge");
          b.style.background = c.color;
          li.appendChild(b);
          const p = make("p","itemText");
          p.innerHTML = `<strong>${t}</strong>`;
          li.appendChild(p);
          ul.appendChild(li);
        });
        scroll.appendChild(ul);
        backBody.appendChild(scroll);

        gridCats.appendChild(wrap);
      });

      if (!gridCats.children.length){
        const empty = make("p");
        empty.style.color = "var(--muted)";
        empty.style.margin = "6px 2px 0";
        empty.textContent = "No hay resultados con ese filtro.";
        gridCats.appendChild(empty);
      }
    }

    searchCats.addEventListener("input", () => renderCategories(searchCats.value));
    el("#resetCats").addEventListener("click", () => { searchCats.value=""; renderCategories(""); });

    // Sección 2
    const gridTools = el("#gridTools");
    const searchTools = el("#searchTools");
    let currentGroup = "Todas";

    function renderTools(filterText="", group="Todas"){
      gridTools.innerHTML = "";
      const q = normalize(filterText);

      const groups = new Set(categories.map(c => c.type));
      const validGroup = (group === "Todas" || groups.has(group)) ? group : "Todas";
      currentGroup = validGroup;

      const filtered = tools.filter(t => {
        const matchesText = normalize(t.name).includes(q) || normalize(t.group).includes(q) || normalize(t.use).includes(q);
        const matchesGroup = (validGroup === "Todas") ? true : t.group === validGroup;
        return matchesText && matchesGroup;
      });

      filtered.forEach(t => {
        const cat = categories.find(c => c.type === t.group);
        const dotColor = cat?.color || "var(--info)";
        const { wrap, frontBody, backBody, front } = cardShell(dotColor);

        front.classList.add("toolFrontOnlyImage");

        const imgBox = make("div","imageBox");
        imgBox.style.minHeight = "260px";

        if (t.img && t.img.trim().length){
          const img = document.createElement("img");
          img.src = t.img;
          img.alt = "Herramienta";
          img.loading = "lazy";

          img.onerror = () => {
            img.remove();
            const fb = make("div","imageFallback");
            fb.innerHTML = `Imagen no encontrada`;
            imgBox.appendChild(fb);

            const label = make("div","fileLabel");
            label.textContent = t.file;
            imgBox.appendChild(label);
          };

          imgBox.appendChild(img);
        } else {
          const fb = make("div","imageFallback");
          fb.textContent = "Sin imagen";
          imgBox.appendChild(fb);

          const label = make("div","fileLabel");
          label.textContent = t.file;
          imgBox.appendChild(label);
        }

        const hint = make("div","hint");
        hint.textContent = "↩︎ Voltear";
        imgBox.appendChild(hint);

        frontBody.appendChild(imgBox);

        const backTitle = make("h3","backTitle");
        backTitle.textContent = "Información";
        backBody.appendChild(backTitle);

        const pills = make("div","pillInfo");
        const pName = make("div","pill"); pName.textContent = `Nombre: ${t.name}`;
        const pGroup = make("div","pill"); pGroup.textContent = `Grupo: ${t.group}`;
        pills.appendChild(pName); pills.appendChild(pGroup);
        backBody.appendChild(pills);

        const scroll = make("div","scrollArea");
        const ul = make("ul","list");

        const li1 = make("li","item");
        const b1 = make("div","badge");
        b1.style.background = dotColor;
        li1.appendChild(b1);

        const p1 = make("p","itemText");
        p1.innerHTML = `<strong>Uso:</strong> ${t.use}`;
        li1.appendChild(p1);

        ul.appendChild(li1);
        scroll.appendChild(ul);
        backBody.appendChild(scroll);

        gridTools.appendChild(wrap);
      });

      if (!gridTools.children.length){
        const empty = make("p");
        empty.style.color = "var(--muted)";
        empty.style.margin = "6px 2px 0";
        empty.textContent = "No hay resultados con ese filtro.";
        gridTools.appendChild(empty);
      }
    }

    searchTools.addEventListener("input", () => renderTools(searchTools.value, currentGroup));
    el("#resetTools").addEventListener("click", () => { searchTools.value=""; currentGroup="Todas"; renderTools("", "Todas"); });

    el("#filterAll").addEventListener("click", () => { currentGroup="Todas"; renderTools(searchTools.value, "Todas"); });

    el("#filterGroup").addEventListener("click", () => {
      const options = ["Todas", ...categories.map(c => c.type)];
      const pick = prompt("Escribí el grupo exacto o el número:\n" + options.map((o,i)=>`${i}. ${o}`).join("\n"), "Todas");
      if (pick === null) return;

      let chosen = pick.trim();
      if (/^\d+$/.test(chosen)){
        chosen = options[Number(chosen)] ?? "Todas";
      } else {
        const norm = normalize(chosen);
        chosen = options.find(o => normalize(o) === norm) || options.find(o => normalize(o).includes(norm)) || "Todas";
      }
      currentGroup = chosen;
      renderTools(searchTools.value, currentGroup);
    });

    // Cambio de sección
    const chips = Array.from(document.querySelectorAll("#modeChips .chip"));
    chips.forEach(ch => {
      ch.addEventListener("click", () => {
        chips.forEach(c => c.classList.remove("active"));
        ch.classList.add("active");
        const target = ch.dataset.target;
        el("#sec1").classList.toggle("hidden", target !== "sec1");
        el("#sec2").classList.toggle("hidden", target !== "sec2");
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });

    renderCategories("");
    renderTools("", "Todas");
  </script>
</body>
</html>
